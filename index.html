<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPINFO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080a0e;
  --surface: #0e1118;
  --line: rgba(255,255,255,0.06);
  --line2: rgba(255,255,255,0.10);
  --text: #f0f2f7;
  --muted: #3d4460;
  --muted2: #636b8a;
  --blue: #4a7cf8;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 32px 20px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(74,124,248,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
}

/* NAV */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 48px;
  opacity: 0;
  animation: up 0.5s 0.05s forwards;
}

.brand {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.15em;
}

.brand em { color: var(--blue); font-style: normal; }

.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--muted2);
  letter-spacing: 0.1em;
}

.dot {
  position: relative;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.4s;
  flex-shrink: 0;
}
.dot.live { background: #22d3a0; }
.dot.live::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1px solid #22d3a0;
  animation: ripple 1.8s infinite;
}
.dot.err { background: #f87171; }

@keyframes ripple {
  0%   { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(2.8); opacity: 0; }
}

/* HERO */
.hero {
  background: var(--surface);
  border: 1px solid var(--line2);
  border-radius: 2px;
  padding: 36px 36px 28px;
  margin-bottom: 2px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: up 0.5s 0.15s forwards;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--blue) 50%, transparent 100%);
  opacity: 0.5;
}

.eyebrow {
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--muted2);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.flag {
  font-size: 52px;
  line-height: 1;
  display: block;
  margin-bottom: 14px;
  min-height: 60px;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.6));
}

.ip-val {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(28px, 8vw, 44px);
  letter-spacing: -0.03em;
  color: #fff;
  margin-bottom: 22px;
  min-height: 54px;
  line-height: 1.1;
}

.hero-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 18px;
  border-top: 1px solid var(--line);
}

.country-badge {
  font-size: 12px;
  color: var(--muted2);
}

.country-badge strong {
  color: var(--text);
  font-weight: 400;
  margin-left: 8px;
}

.copy-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--blue);
  background: rgba(74,124,248,0.06);
  border: 1px solid rgba(74,124,248,0.2);
  border-radius: 2px;
  padding: 6px 14px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}

.copy-btn:hover {
  background: rgba(74,124,248,0.12);
  border-color: rgba(74,124,248,0.45);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2px;
  margin-bottom: 2px;
  opacity: 0;
  animation: up 0.5s 0.25s forwards;
}

.cell {
  background: var(--surface);
  border: 1px solid var(--line2);
  border-radius: 2px;
  padding: 16px 18px;
  transition: border-color 0.2s;
}

.cell:hover { border-color: rgba(255,255,255,0.16); }

.cell-lbl {
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}

.cell-val {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  word-break: break-word;
  line-height: 1.45;
  min-height: 16px;
}

/* BOTTOM */
.bottom {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2px;
  opacity: 0;
  animation: up 0.5s 0.35s forwards;
}

.tz-cell {
  background: var(--surface);
  border: 1px solid var(--line2);
  border-radius: 2px;
  padding: 16px 18px;
}

.refresh {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 2px;
  padding: 0 26px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  white-space: nowrap;
}

.refresh:hover { opacity: 0.82; }
.refresh:active { transform: scale(0.97); }
.refresh:disabled { opacity: 0.35; cursor: not-allowed; }

/* FOOTER */
.foot {
  margin-top: 20px;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-align: center;
  opacity: 0;
  animation: up 0.5s 0.45s forwards;
}

/* SKELETON */
.sk {
  display: inline-block;
  background: linear-gradient(90deg, var(--line2) 25%, rgba(255,255,255,0.08) 50%, var(--line2) 75%);
  background-size: 300% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 2px;
  color: transparent;
  user-select: none;
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #0e1118;
  border: 1px solid #22d3a0;
  color: #22d3a0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 9px 22px;
  border-radius: 2px;
  opacity: 0;
  transition: all 0.22s;
  pointer-events: none;
  z-index: 100;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@keyframes up {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="wrap">

  <nav class="nav">
    <div class="brand"><em>IP</em>INFO</div>
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="stxt">ИНИЦИАЛИЗАЦИЯ</span>
    </div>
  </nav>

  <div class="hero">
    <div class="eyebrow">Текущее подключение</div>
    <span class="flag" id="flag">🌐</span>
    <div class="ip-val" id="ip">—</div>
    <div class="hero-footer">
      <div class="country-badge">Страна<strong id="country">—</strong></div>
      <button class="copy-btn" onclick="copyIP()">Скопировать IP</button>
    </div>
  </div>

  <div class="grid">
    <div class="cell"><div class="cell-lbl">Город</div><div class="cell-val" id="city">—</div></div>
    <div class="cell"><div class="cell-lbl">Регион</div><div class="cell-val" id="region">—</div></div>
    <div class="cell"><div class="cell-lbl">Код страны</div><div class="cell-val" id="cc">—</div></div>
    <div class="cell" style="grid-column:span 2"><div class="cell-lbl">Провайдер</div><div class="cell-val" id="isp">—</div></div>
    <div class="cell"><div class="cell-lbl">Организация</div><div class="cell-val" id="org">—</div></div>
  </div>

  <div class="bottom">
    <div class="tz-cell"><div class="cell-lbl">Часовой пояс</div><div class="cell-val" id="tz">—</div></div>
    <button class="refresh" id="rbtn" onclick="load()">⟳ Обновить</button>
  </div>

  <div class="foot">источник: ip-api.com &nbsp;·&nbsp; обновляется по запросу</div>
</div>

<div class="toast" id="toast">IP скопирован</div>

<script>
const g = id => document.getElementById(id);

function setStatus(txt, cls) {
  g('stxt').textContent = txt;
  g('dot').className = 'dot ' + (cls || '');
}

function skeleton() {
  g('ip').innerHTML = '<span class="sk">000.000.000.000</span>';
  g('flag').textContent = '🌐';
  ['country','city','region','cc','isp','org','tz'].forEach(id =>
    g(id).innerHTML = '<span class="sk">загрузка</span>'
  );
}

async function load() {
  const btn = g('rbtn');
  btn.disabled = true;
  btn.textContent = '... Загрузка';
  setStatus('ЗАПРОС', '');
  skeleton();

  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();

    if (d.ip && !d.error) {
      g('ip').textContent      = d.ip            || '—';
      g('country').textContent = ' ' + (d.country_name  || '—');
      g('city').textContent    = d.city           || '—';
      g('region').textContent  = d.region         || '—';
      g('cc').textContent      = d.country_code   || '—';
      g('isp').textContent     = d.org            || '—';
      g('org').textContent     = d.asn            || '—';
      g('tz').textContent      = d.timezone       || '—';

      const code = d.country_code || '';
      if (code.length === 2) {
        g('flag').textContent = [...code.toUpperCase()]
          .map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65))
          .join('');
      }

      setStatus('АКТИВНО', 'live');
    } else throw 0;
  } catch {
    g('ip').textContent = 'Ошибка';
    ['country','city','region','cc','isp','org','tz'].forEach(id => g(id).textContent = '—');
    setStatus('ОШИБКА', 'err');
  }

  btn.disabled = false;
  btn.textContent = '⟳ Обновить';
}

function copyIP() {
  const ip = g('ip').textContent.trim();
  if (!ip || ip === '—' || ip === 'Ошибка') return;
  navigator.clipboard.writeText(ip).then(() => {
    const t = g('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

load();
</script>
</body>
</html>
